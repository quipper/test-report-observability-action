name: e2e-rerun

on:
  workflow_run:
    workflows:
      - e2e
    types:
      - completed

jobs:
  rerun-first-attempt-failure:
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt == 1
    runs-on: ubuntu-slim
    timeout-minutes: 10
    permissions:
      actions: write # To rerun workflows
    steps:
      - uses: int128/rerun-workflows-action@7fc3185d4e932b0be58963f598ce394f8d8dc09a # v1.4.0
