name: e2e

on:
  pull_request:
    paths:
      - src/**
      - tests/**
      - '*.json'
      - '*.yaml'
      - .github/workflows/e2e.yaml
  push:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - '*.json'
      - '*.yaml'
      - .github/workflows/e2e.yaml

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - run: npm install -g pnpm@latest-10
      - run: pnpm i
      - run: pnpm run build

      # The test fixture intentionally fails on the first attempt.
      - run: pnpm run test
        env:
          ENABLE_FLAKY_TEST_FIXTURE: true

      - if: always()
        name: quipper/test-report-observability-action
        uses: ./
        with:
          junit-xml-path: junit.xml
          send-test-case-success: true
          filter-test-file-slower-than: 0
          filter-test-case-slower-than: 0
          datadog-tags: |
            service:test-report-observability-action
